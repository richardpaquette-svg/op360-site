<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond noir arrondi pour icône Android/iOS -->
  <rect width="64" height="64" rx="14" ry="14" fill="#111111"/>
  <!-- Roue OP360 — couleurs exactes du logo -->
  <!-- Haut : teal vif -->
  <circle cx="32" cy="8"  r="5.5" fill="#00C5AE"/>
  <!-- Haut-droite : vert sauge -->
  <circle cx="47" cy="14" r="4.5" fill="#5BAD8F"/>
  <!-- Droite : teal foncé -->
  <circle cx="56" cy="28" r="4"   fill="#00796B"/>
  <!-- Bas-droite : bleu marine -->
  <circle cx="53" cy="44" r="4"   fill="#1A3A6B"/>
  <!-- Bas : indigo/violet foncé -->
  <circle cx="40" cy="55" r="4.5" fill="#3D2B7A"/>
  <!-- Bas-gauche : violet -->
  <circle cx="24" cy="55" r="4.5" fill="#6A1B9A"/>
  <!-- Gauche : rouge -->
  <circle cx="11" cy="44" r="4"   fill="#C0392B"/>
  <!-- Haut-gauche : orange -->
  <circle cx="8"  cy="28" r="4"   fill="#E67E22"/>
  <!-- Haut-gauche 2 : vert-lime -->
  <circle cx="17" cy="14" r="4.5" fill="#8BC34A"/>
</svg>
