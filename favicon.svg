<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fond noir arrondi -->
  <rect width="512" height="512" rx="115" fill="#111111"/>
  <defs>
    <!-- Dégradés des arcs, de dot à dot dans le sens horaire -->
    <linearGradient id="g1" gradientUnits="userSpaceOnUse" x1="256" y1="66" x2="390" y2="122">
      <stop offset="0%" stop-color="#2ED4C4"/>
      <stop offset="100%" stop-color="#1BA8A0"/>
    </linearGradient>
    <linearGradient id="g2" gradientUnits="userSpaceOnUse" x1="390" y1="122" x2="446" y2="256">
      <stop offset="0%" stop-color="#1BA8A0"/>
      <stop offset="100%" stop-color="#1A8A8A"/>
    </linearGradient>
    <linearGradient id="g3" gradientUnits="userSpaceOnUse" x1="446" y1="256" x2="390" y2="390">
      <stop offset="0%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#4B62C8"/>
    </linearGradient>
    <linearGradient id="g4" gradientUnits="userSpaceOnUse" x1="390" y1="390" x2="256" y2="446">
      <stop offset="0%" stop-color="#4B62C8"/>
      <stop offset="100%" stop-color="#7050A8"/>
    </linearGradient>
    <linearGradient id="g5" gradientUnits="userSpaceOnUse" x1="256" y1="446" x2="122" y2="390">
      <stop offset="0%" stop-color="#7050A8"/>
      <stop offset="100%" stop-color="#DA3535"/>
    </linearGradient>
    <linearGradient id="g6" gradientUnits="userSpaceOnUse" x1="122" y1="390" x2="66" y2="256">
      <stop offset="0%" stop-color="#DA3535"/>
      <stop offset="100%" stop-color="#F06030"/>
    </linearGradient>
    <linearGradient id="g7" gradientUnits="userSpaceOnUse" x1="66" y1="256" x2="122" y2="122">
      <stop offset="0%" stop-color="#F06030"/>
      <stop offset="100%" stop-color="#F5CE40"/>
    </linearGradient>
    <linearGradient id="g8" gradientUnits="userSpaceOnUse" x1="122" y1="122" x2="256" y2="66">
      <stop offset="0%" stop-color="#F5CE40"/>
      <stop offset="100%" stop-color="#2ED4C4"/>
    </linearGradient>
  </defs>

  <!-- Arcs (rayon orbital 190, centre 256,256) -->
  <path d="M 256 66  A 190 190 0 0 1 390 122" fill="none" stroke="url(#g1)" stroke-width="30" stroke-linecap="round"/>
  <path d="M 390 122 A 190 190 0 0 1 446 256" fill="none" stroke="url(#g2)" stroke-width="30" stroke-linecap="round"/>
  <path d="M 446 256 A 190 190 0 0 1 390 390" fill="none" stroke="url(#g3)" stroke-width="30" stroke-linecap="round"/>
  <path d="M 390 390 A 190 190 0 0 1 256 446" fill="none" stroke="url(#g4)" stroke-width="30" stroke-linecap="round"/>
  <path d="M 256 446 A 190 190 0 0 1 122 390" fill="none" stroke="url(#g5)" stroke-width="30" stroke-linecap="round"/>
  <path d="M 122 390 A 190 190 0 0 1  66 256" fill="none" stroke="url(#g6)" stroke-width="30" stroke-linecap="round"/>
  <path d="M  66 256 A 190 190 0 0 1 122 122" fill="none" stroke="url(#g7)" stroke-width="30" stroke-linecap="round"/>
  <path d="M 122 122 A 190 190 0 0 1 256  66" fill="none" stroke="url(#g8)" stroke-width="30" stroke-linecap="round"/>

  <!-- Cercles colorés (dots) — dessinés après les arcs pour être au-dessus -->
  <circle cx="256" cy=" 66" r="42" fill="#2ED4C4"/>  <!-- Haut : turquoise -->
  <circle cx="390" cy="122" r="38" fill="#1BA8A0"/>  <!-- Haut-droite : teal -->
  <circle cx="446" cy="256" r="38" fill="#1A8A8A"/>  <!-- Droite : teal foncé -->
  <circle cx="390" cy="390" r="38" fill="#4B62C8"/>  <!-- Bas-droite : bleu-indigo -->
  <circle cx="256" cy="446" r="42" fill="#7050A8"/>  <!-- Bas : violet -->
  <circle cx="122" cy="390" r="38" fill="#DA3535"/>  <!-- Bas-gauche : rouge -->
  <circle cx=" 66" cy="256" r="38" fill="#F06030"/>  <!-- Gauche : orange-rouge -->
  <circle cx="122" cy="122" r="38" fill="#F5CE40"/>  <!-- Haut-gauche : jaune -->
</svg>
